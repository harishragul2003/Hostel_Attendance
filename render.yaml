databases:
  - name: hostel-db
    databaseName: hosteldb
    user: hosteluser
    plan: free

services:
  - type: web
    name: hosteltrack-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: hostel-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
