{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Weekly Menu Management</h5>
                <form method="POST" class="row g-3 mb-4">
                    <div class="col-md-3">
                        <label for="day" class="form-label">Day</label>
                        <select class="form-select" id="day" name="day" required>
                            <option selected disabled>Select day</option>
                            {% for d in ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"] %}
                            <option value="{{ d }}">{{ d }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="meal_type" class="form-label">Meal Type</label>
                        <select class="form-select" id="meal_type" name="meal_type" required>
                            <option selected disabled>Select meal</option>
                            {% for m in ["breakfast","lunch","dinner"] %}
                            <option value="{{ m }}">{{ m.title() }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="description" class="form-label">Description</label>
                        <input type="text" class="form-control" id="description" name="description" required placeholder="Menu description">
                    </div>
                    <div class="col-md-2">
                        <label for="cost" class="form-label">Cost</label>
                        <input type="number" step="0.01" class="form-control" id="cost" name="cost" required placeholder="₹0.00">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Add Entry</button>
                    </div>
                </form>
                <script>
                    // Auto-fill cost based on selected meal schedule
                    const schedules = JSON.parse('{{ schedules|tojson|safe }}');
                    document.addEventListener('DOMContentLoaded', () => {
                        const mealSelect = document.getElementById('meal_type');
                        const costInput = document.getElementById('cost');
                        mealSelect.addEventListener('change', () => {
                            costInput.value = schedules[mealSelect.value] || '';
                        });
                    });
                </script>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Day</th>
                                <th>Meal</th>
                                <th>Description</th>
                                <th>Cost</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in menus %}
                            <tr>
                                <td>{{ item.day }}</td>
                                <td>{{ item.meal_type.title() }}</td>
                                <td>{{ item.description }}</td>
                                <td>₹{{ "%.2f"|format(item.cost) }}</td>
                                <td>
                                    <a href="{{ url_for('edit_weekly_menu', menu_id=item.id) }}" class="btn btn-sm btn-outline-primary me-1">Edit</a>
                                    <form action="{{ url_for('delete_weekly_menu', menu_id=item.id) }}" method="POST" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this entry?')">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
