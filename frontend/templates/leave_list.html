{% extends "base.html" %}

{% block content %}
<div class="row">
  <div class="col-12">
    <h3>Students on Leave Today</h3>
    <div class="table-responsive mt-3">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>Name</th>
            <th>Room</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          {% for record in records %}
            <tr>
              <td>{{ record.user.name }}</td>
              <td>{{ record.user.room_number }}</td>
              <td>{{ record.date.strftime('%Y-%m-%d') }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mt-3">Back</a>
  </div>
</div>
{% endblock %}
